# pnpm 11+ settings (migrated from package.json's pnpm field).
# Reference: https://pnpm.io/settings

onlyBuiltDependencies:
  - '@biomejs/biome'
  - esbuild
  - msw

# Supply-chain policy: minimum age (seconds) a package version must have on
# the registry before pnpm will install it. Set to 0 to disable the check.
# We disable it for fast iteration; tighten later when the project stabilises.
minimumReleaseAge: 0
